changelog:
  exclude:
    labels:
      - 'pr:invalid'
      - 'pr:tests'
  categories:
    - title: '🚀 New Features'
      labels:
        - 'pr:new feature'
    - title: '🔬 Improvements'
      labels:
        - 'pr:improvement'
    - title: '🐞 Bug Fixes'
      labels:
        - 'pr:bug'
    - title: '📦 Dependency updates'
      labels:
        - 'pr:dependencies'
    - title: '📄 Documentation updates'
      labels:
        - 'pr:documentation'
    - title: '⛔️ Security'
      labels:
        - 'pr:security'
    - title: '🧰 Maintenance'
      labels:
        - 'pr:internal'
